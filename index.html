<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --blue: #2563eb;
    --text: #7c4b67;
    --shadow: 0 20px 50px rgba(117, 67, 101, 0.22);
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background:
      linear-gradient(rgba(255,255,255,0.14), rgba(255,255,255,0.14)),
      url("fundo.jpg") center center / cover no-repeat fixed;
  }

  .page {
    width: 100%;
    display: flex;
    justify-content: center;
  }

  .card {
  width: 100%;
  max-width: 390px;
  background: linear-gradient(45deg, #f58529, #dd2a7b, #8134af, #515bd4);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius: 30px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(117, 67, 101, 0.18);
  border: none;
}

 .hero {
  padding: 18px;
}



/* Imagem dentro */
.foto-moldura img {
  width: 100%;
  height: 260px; /* deixa menor */
  object-fit: cover;
  object-position: center top;
  display: block;

  border-radius: 20px;
}
  .content {
    padding: 18px 18px 22px;
    background: linear-gradient(
      to bottom,
      rgba(255,255,255,0.92),
      rgba(255,255,255,0.82)
    );
    margin-top: 14px;
  }

  .badge {
    width: fit-content;
    margin: 0 auto 12px;
    padding: 8px 14px;
    border-radius: 999px;
    background: linear-gradient(90deg, #e0f2ff, #f0f9ff);
    color: var(--blue);
    font-size: 12px;
    font-weight: 700;
    box-shadow: inset 0 0 0 1px rgba(37, 99, 235, 0.15);
    text-align: center;
  }

  h1 {
    text-align: center;
    font-size: 34px;
    line-height: 1;
    margin-bottom: 10px;
    font-weight: 900;
    background: linear-gradient(90deg, #f58529, #dd2a7b, #8134af);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    text-align: center;
    color: var(--text);
    font-size: 16px;
    line-height: 1.45;
    font-weight: 600;
    margin-bottom: 22px;
  }

  .buttons {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 15px 18px;
    border-radius: 999px;
    text-decoration: none;
    color: #fff;
    font-weight: 700;
    font-size: 16px;
    transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
    box-shadow: 0 10px 20px rgba(0,0,0,0.12);
  }

  .btn:hover {
    transform: translateY(-2px);
    opacity: 0.98;
  }

  .btn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
    display: block;
  }

  .whatsapp {
    background: linear-gradient(90deg, #22c55e, #25D366);
  }

  .instagram {
    background: linear-gradient(90deg, #f59e0b, #ec4899, #8b5cf6);
  }

  .facebook {
    background: linear-gradient(90deg, #1d4ed8, #1877F2);
  }

  .tiktok {
    background: linear-gradient(90deg, #111111, #222222);
  }

  .footer {
    text-align: center;
    margin-top: 18px;
    color: var(--blue);
    font-size: 13px;
    font-weight: 700;
    line-height: 1.4;
  }

  @media (max-width: 430px) {
    body {
      padding: 12px;
    }

    .card {
      border-radius: 24px;
    }

   .hero {
  padding: 12px 12px 0;
}

.hero img {
  height: 300px;
  border-radius: 24px;
  border-width: 9px;
}

    .content {

    }

    h1 {
      font-size: 31px;
    }

    .subtitle {
      font-size: 15px;
    }

    .btn {
      font-size: 15px;
      padding: 14px 15px;
    }
  }
</style>
