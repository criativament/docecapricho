<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doce Capricho</title>
  <meta name="description" content="Doce Capricho - Tudo feito com muito amor e carinho." />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --pink: #f06cab;
      --pink-dark: #d94d93;
      --purple: #8b5cf6;
      --text: #7d3a67;
      --white: rgba(255, 255, 255, 0.88);
      --shadow: 0 18px 45px rgba(154, 82, 132, 0.22);
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background:
        linear-gradient(rgba(255,255,255,0.16), rgba(255,255,255,0.16)),
        url("fundo.jpeg") center center / cover no-repeat fixed;
    }

    .wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(255, 255, 255, 0.38);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.45);
    }

    .hero {
      position: relative;
      background: rgba(255,255,255,0.28);
    }

    .hero img {
      width: 100%;
      display: block;
      object-fit: cover;
    }

    .content {
      padding: 18px 16px 20px;
      background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.90),
        rgba(255,255,255,0.78)
      );
    }

    .title {
      text-align: center;
      font-size: 23px;
      line-height: 1.1;
      color: var(--pink-dark);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: var(--text);
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 18px;
      font-weight: 600;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 16px;
      border-radius: 999px;
      transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
      box-shadow: 0 8px 18px rgba(0,0,0,0.10);
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.98;
    }

    .btn:active {
      transform: translateY(0);
    }

    .icon {
      font-size: 17px;
      line-height: 1;
    }

    .whatsapp {
      background: linear-gradient(90deg, #23c95b, #25D366);
    }

    .instagram {
      background: linear-gradient(90deg, #f59e0b, #ec4899, #8b5cf6);
    }

    .facebook {
      background: linear-gradient(90deg, #1e63d7, #1877F2);
    }

    .tiktok {
      background: linear-gradient(90deg, #111111, #222222);
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      color: var(--pink-dark);
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 420px) {
      body {
        padding: 14px;
      }

      .card {
        max-width: 100%;
        border-radius: 24px;
      }

      .content {
        padding: 16px 14px 18px;
      }

      .title {
        font-size: 21px;
      }

      .btn {
        font-size: 14px;
        padding: 13px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <main class="card">
      <div class="hero">
        <img src="docecapricho.jpg" alt="Doce Capricho">
      </div>

      <section class="content">
        <h1 class="title">Doce Capricho</h1>
        <p class="subtitle">Tudo feito com muito amor e carinho 💖</p>

        <div class="buttons">
          <a class="btn whatsapp" href="https://wa.me/5518997711378" target="_blank" rel="noopener noreferrer">
            <span class="icon">💬</span>
            <span>WhatsApp</span>
          </a>

          <a class="btn instagram" href="https://www.instagram.com/doce_capricho_20_29/" target="_blank" rel="noopener noreferrer">
            <span class="icon">📸</span>
            <span>Instagram</span>
          </a>

          <a class="btn facebook" href="https://www.facebook.com/profile/100005342621663/search/?q=docecapricho" target="_blank" rel="noopener noreferrer">
            <span class="icon">📘</span>
            <span>Facebook</span>
          </a>

          <a class="btn tiktok" href="https://www.tiktok.com/@carinamirandabeto" target="_blank" rel="noopener noreferrer">
            <span class="icon">🎵</span>
            <span>TikTok</span>
          </a>
        </div>

        <div class="footer">
          Encomendas com carinho para momentos especiais ✨
        </div>
      </section>
    </main>
  </div>
</body>
</html>
