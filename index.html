<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doce Capricho</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
  font-family: Arial, Helvetica, sans-serif;

  background: url("fundo.jpeg") no-repeat center center;
  background-size: cover;

  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .card {
  background: rgba(255, 255, 255, 0.75);
  backdrop-filter: blur(10px);
  border-radius: 30px;
  padding: 16px;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
}box-shadow: 0 15px 40px rgba(214, 85, 157, 0.25);
    }

    .arte {
      width: 100%;
      border-radius: 20px;
      margin-bottom: 15px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .btn {
      text-decoration: none;
      color: white;
      font-weight: bold;
      padding: 14px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-size: 16px;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .whatsapp { background: #25D366; }
    .instagram {
      background: linear-gradient(90deg, #f58529, #dd2a7b, #8134af, #515bd4);
    }
    .facebook { background: #1877F2; }
    .tiktok { background: #111; }

    .footer {
      margin-top: 15px;
      font-size: 13px;
      color: #b04a7f;
      font-weight: bold;
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="card">

      <img src="docecapricho.jpg" class="arte" alt="Doce Capricho">

      <div class="buttons">

        <a class="btn whatsapp"
           href="https://wa.me/5518997711378"
           target="_blank">
          💬 WhatsApp
        </a>

        <a class="btn instagram"
           href="https://www.instagram.com/doce_capricho_20_29/"
           target="_blank">
          📸 Instagram
        </a>

        <a class="btn facebook"
           href="https://www.facebook.com/profile/100005342621663/search/?q=docecapricho"
           target="_blank">
          📘 Facebook
        </a>

        <a class="btn tiktok"
           href="https://www.tiktok.com/@carinamirandabeto"
           target="_blank">
          🎵 TikTok
        </a>

      </div>

      <div class="footer">
        Tudo feito com muito amor e carinho 💖
      </div>

    </div>
  </div>
</body>
</html>
